<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRHS Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #002060;
      --gold:  #FFB800;
      --light: #f4f6fb;
      --white: #ffffff;
      --text:  #1a1a2e;
      --muted: #6b7280;
      --radius: 12px;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--light); }

    /* ── Layout ── */
    .chat-shell {
      display: flex; flex-direction: column; height: 100vh;
      max-width: 700px; margin: 0 auto; background: var(--white);
      box-shadow: 0 0 40px rgba(0,0,0,.08);
    }

    /* ── Header ── */
    .chat-header {
      background: var(--navy); color: var(--white);
      padding: 14px 18px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .chat-header img { width: 36px; height: 36px; border-radius: 50%; background: var(--gold); padding: 4px; }
    .chat-header .info h2 { font-size: .95rem; font-weight: 700; }
    .chat-header .info p  { font-size: .75rem; opacity: .75; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
      margin-left: auto; flex-shrink: 0;
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .msg { display: flex; gap: 10px; max-width: 90%; animation: fadein .2s ease; }
    .msg.user  { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
    }
    .msg.bot  .avatar { background: var(--navy); color: var(--gold); }
    .msg.user .avatar { background: var(--gold); color: var(--navy); }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius); font-size: .88rem;
      line-height: 1.55; word-break: break-word;
    }
    .msg.bot  .bubble { background: var(--light); color: var(--text); border-top-left-radius: 4px; }
    .msg.user .bubble { background: var(--navy); color: var(--white); border-top-right-radius: 4px; }

    .sources {
      margin-top: 8px; font-size: .75rem; color: var(--muted);
    }
    .sources summary { cursor: pointer; color: var(--navy); font-weight: 600; }
    .sources a { color: var(--navy); text-decoration: none; }
    .sources a:hover { text-decoration: underline; }

    /* Typing indicator */
    .typing .bubble { padding: 12px 16px; }
    .dot-row { display: flex; gap: 5px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* ── Input bar ── */
    .chat-input-area {
      padding: 12px 14px; border-top: 1px solid #e5e7eb;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
      background: var(--white);
    }
    .chat-input-area textarea {
      flex: 1; resize: none; border: 1.5px solid #d1d5db;
      border-radius: 10px; padding: 10px 12px; font-size: .9rem;
      font-family: inherit; outline: none; line-height: 1.4; max-height: 120px;
      transition: border-color .2s;
    }
    .chat-input-area textarea:focus { border-color: var(--navy); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 10px; border: none;
      background: var(--navy); color: var(--white); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s, transform .1s;
    }
    .send-btn:hover  { background: #003080; }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* ── Welcome card ── */
    .welcome {
      background: linear-gradient(135deg, var(--navy) 0%, #003899 100%);
      border-radius: var(--radius); padding: 20px; color: var(--white);
      margin-bottom: 6px;
    }
    .welcome h3 { font-size: 1rem; margin-bottom: 6px; }
    .welcome p  { font-size: .82rem; opacity: .85; line-height: 1.5; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .chip {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px; padding: 5px 12px; font-size: .78rem; cursor: pointer;
      color: var(--white); transition: background .2s;
    }
    .chip:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>
<div class="chat-shell">

  <div class="chat-header">
    <img src="https://hs.brrsd.org/favicon.ico" alt="BRHS" onerror="this.style.display='none'" />
    <div class="info">
      <h2>BRHS Assistant</h2>
      <p>Bridgewater-Raritan High School</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="welcome">
      <h3>Hi! I'm the BRHS Assistant 👋</h3>
      <p>Ask me about courses, scheduling, counseling, clubs, and anything else about Bridgewater-Raritan High School.</p>
      <div class="chips">
        <span class="chip" onclick="sendChip(this)">Course catalog</span>
        <span class="chip" onclick="sendChip(this)">Schedule changes</span>
        <span class="chip" onclick="sendChip(this)">Counseling office</span>
        <span class="chip" onclick="sendChip(this)">AP courses offered</span>
        <span class="chip" onclick="sendChip(this)">Clubs &amp; activities</span>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="input" rows="1" placeholder="Ask a question about BRHS…"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const API = (window.BRHS_API_BASE || '') + '/api/chat';
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  let history = [];
  let busy    = false;

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendChip(el) {
    inputEl.value = el.textContent.trim();
    sendMessage();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    wrap.innerHTML = `
      <div class="avatar">${role === 'bot' ? 'BR' : 'You'}</div>
      <div>
        <div class="bubble" id="bubble-${Date.now()}">${escHtml(text)}</div>
      </div>`;
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap.querySelector('.bubble');
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="avatar">BR</div><div class="bubble"><div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  // Very light markdown: **bold**, *italic*, `code`, links
  function renderMarkdown(t) {
    return t
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    const typingEl = addTyping();

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    let rawText = '';
    let sources = [];

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      if (!res.body) throw new Error('No streaming body');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      typingEl.remove();
      const msgWrap = document.createElement('div');
      msgWrap.className = 'msg bot';
      msgWrap.innerHTML = `<div class="avatar">BR</div><div></div>`;
      msgWrap.querySelector('div:last-child').appendChild(bubble);
      messagesEl.appendChild(msgWrap);
      scrollBottom();

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = JSON.parse(line.slice(6));
          if (payload.delta) {
            rawText += payload.delta;
            bubble.innerHTML = renderMarkdown(rawText);
            scrollBottom();
          }
          if (payload.error) {
            bubble.innerHTML = `<span style="color:#dc2626">${escHtml(payload.error)}</span>`;
          }
          if (payload.done) {
            sources = payload.sources || [];
            if (sources.length) {
              const details = document.createElement('details');
              details.className = 'sources';
              details.innerHTML = `<summary>Sources (${sources.length})</summary>` +
                sources.map(s => `<div>• <a href="${s.url}" target="_blank" rel="noopener">${escHtml(s.title)}</a> <span>[${s.type.toUpperCase()}]</span></div>`).join('');
              msgWrap.querySelector('div:last-child').appendChild(details);
              scrollBottom();
            }
          }
        }
      }
    } catch (err) {
      typingEl?.remove();
      addMessage('bot', 'Sorry, something went wrong. Please try again.');
      console.error(err);
    }

    history.push({ role: 'user', content: text });
    if (rawText) history.push({ role: 'assistant', content: rawText });
    // Keep last 12 turns
    if (history.length > 24) history = history.slice(-24);

    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
